name: Email pipeline health

on:
  push:
    branches: [main]
    paths:
      - 'netlify/functions/send-quote.js'
      - 'tests/email-pipeline-health.sh'
      - 'tests/email-pipeline-spec-gate.json'
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch: {}

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq + dig
        run: sudo apt-get update && sudo apt-get install -y jq dnsutils
      - name: Check vendored spec-gate is not stale
        # Canonical contract.json is in dtf-helsinki-site (not checked out in CI).
        # sync-spec-gate.sh --check exits 0 when canonical is absent (CI-safe).
        run: bash tests/sync-spec-gate.sh --check
      - name: Run health gates
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: bash tests/email-pipeline-health.sh
