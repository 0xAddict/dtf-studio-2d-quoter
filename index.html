<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DTF Studio Helsinki — Tarjouspyyntölomake. Lähetä kuvasi ja saa välitön hinta-arvio gang sheet -painatukselle.">
  <title>DTF Studio Helsinki — Tarjouslaskuri</title>

  <!-- Brand fonts — non-blocking (matches dtfstudio.fi pattern) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper:    '#f4e4bc',
            'paper-2': '#e8d8b0',
            'field':  '#fbf2d6',
            ink:      '#1a1a1a',
            'ink-soft': '#44423d',
            crimson:  '#b22222',
            'crimson-soft': '#c64a4a',
            cure:     '#d4a017',
          },
          fontFamily: {
            serif: ["'Source Serif 4'", "'Source Serif Pro'", 'Georgia', 'serif'],
            mono:  ["'IBM Plex Mono'", "'Courier New'", 'monospace'],
            sans:  ["'Source Serif 4'", 'Georgia', 'serif'],
          },
          borderRadius: {
            'none': '0px',
            DEFAULT: '2px',
            sm: '2px',
            md: '4px',
          },
          animation: {
            'spin': 'spin 1s linear infinite',
            'fade-in': 'fadeIn 0.25s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
          },
          minHeight: {
            'touch': '44px',
          },
          minWidth: {
            'touch': '44px',
          },
        },
      },
    }
  </script>
  <style>
    /* DTF Studio Helsinki — Brand tokens (locked, matches dtfstudio.fi) */
    :root {
      --paper:       #f4e4bc;
      --paper-2:     #e8d8b0;
      --field:       #fbf2d6;
      --ink:         #1a1a1a;
      --ink-soft:    #44423d;
      --crimson:     #b22222;
      --crimson-soft:#c64a4a;
      --cure:        #d4a017;
      --serif:       'Source Serif 4', 'Source Serif Pro', Georgia, serif;
      --mono:        'IBM Plex Mono', 'Courier New', monospace;

      /* --color-* semantic aliases for customer shell components
       * (tokens.css owned by epic 02-admin-branding — read-only consumer here) */
      --color-paper:       var(--paper);
      --color-paper-2:     var(--paper-2);
      --color-field:       var(--field);
      --color-ink:         var(--ink);
      --color-ink-soft:    var(--ink-soft);
      --color-accent:      var(--crimson);
      --color-accent-soft: var(--crimson-soft);
      --color-cure:        var(--cure);
      --color-mono:        var(--mono);
      --color-serif:       var(--serif);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      overflow-x: clip;
    }

    body, html {
      background-color: var(--paper);
      color: var(--ink);
      font-family: var(--serif);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.6;
      overflow-x: clip;
    }

    #root {
      width: 100%;
      min-height: 100vh;
    }

    :focus-visible {
      outline: 2px solid var(--crimson);
      outline-offset: 2px;
    }

    /* Minimum tap targets — WCAG 2.5.5 */
    a, button, [role="button"], input[type="submit"], input[type="button"], select {
      min-height: 44px;
    }

    /* Scrollbar — understated manila palette */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: var(--paper-2); }
    ::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink); }

    /* Kicker — mono uppercase label style */
    .kicker {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.85;
      color: var(--ink);
    }
    .kicker--crimson { color: var(--crimson); opacity: 1; }

    /* Section header with crimson 2px underline */
    .section-header {
      font-family: var(--serif);
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--ink);
      border-bottom: 2px solid var(--crimson);
      padding-bottom: 4px;
      display: inline-block;
      margin-bottom: 12px;
    }

    /* Card — paper-2 bg, 2px ink border */
    .brand-card {
      background: var(--paper-2);
      border: 2px solid var(--ink);
    }

    /* Primary button — ink bg, manila text, 2px max radius */
    .btn-primary {
      background: var(--ink);
      color: var(--paper);
      border: 2px solid var(--ink);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 12px 24px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-height: 44px;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--crimson);
      border-color: var(--crimson);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Ghost button */
    .btn-ghost {
      background: transparent;
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
      min-height: 44px;
    }
    .btn-ghost:hover:not(:disabled) { background: var(--paper-2); }

    /* Text input */
    .brand-input {
      width: 100%;
      background: var(--field);
      color: var(--ink);
      border: 2px solid var(--ink);
      border-radius: 2px;
      font-family: var(--serif);
      font-size: 1rem;
      padding: 10px 14px;
      min-height: 44px;
      outline: none;
    }
    .brand-input:focus { border-color: var(--crimson); }
    .brand-input::placeholder { color: var(--ink-soft); opacity: 0.7; }

    /* Status stamp — inline badge with 2px border */
    .status-stamp {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border: 2px solid currentColor;
      padding: 2px 6px;
      border-radius: 0;
      display: inline-block;
    }
    .status-stamp--pending  { color: var(--cure); }
    .status-stamp--active   { color: var(--crimson); }
    .status-stamp--done     { color: var(--ink); }
    .status-stamp--error    { color: var(--crimson); }

    /* Stat box — paper bg with ink border */
    .stat-box {
      background: var(--paper);
      border: 1px solid var(--paper-2);
      padding: 14px;
    }
    .stat-box__label {
      font-family: var(--mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ink-soft);
      margin-bottom: 4px;
    }
    .stat-box__value {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
    }
    .stat-box__sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    /* Total panel */
    .total-panel {
      background: var(--ink);
      color: var(--paper);
      border: 2px solid var(--ink);
      padding: 20px 24px;
    }
    .total-panel__label {
      font-family: var(--mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--paper-2);
    }
    .total-panel__amount {
      font-family: var(--serif);
      font-size: 2.25rem;
      font-weight: 700;
      color: var(--paper);
      line-height: 1.1;
    }

    /* Error panel */
    .error-panel {
      border: 2px solid var(--crimson);
      background: #fff8f8;
      color: var(--crimson);
      padding: 12px 16px;
      font-family: var(--serif);
      font-size: 0.875rem;
    }

    /* Rule line */
    .rule { border: none; border-top: 1px solid var(--paper-2); }

    /* ── Customer shell: status timeline ──────────────────────────────────
     * tokens.css owned by epic 02-admin-branding; this block is a
     * read-only consumer of --color-* aliases defined in :root above.
     * ──────────────────────────────────────────────────────────────────── */
    .status-timeline {
      display: flex;
      align-items: flex-start;
      gap: 0;
      padding: 20px 0 8px;
      overflow-x: auto;
    }
    .status-timeline__step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      min-width: 72px;
    }
    .status-timeline__step::before {
      content: '';
      position: absolute;
      top: 11px;
      left: calc(-50% + 13px);
      right: calc(50% + 13px);
      height: 2px;
      background: var(--color-paper-2);
    }
    .status-timeline__step:first-child::before { display: none; }
    .status-timeline__step--done::before { background: var(--color-accent); }
    .status-timeline__step--active::before { background: var(--color-accent); }
    .status-timeline__dot {
      width: 26px;
      height: 26px;
      border: 2px solid var(--color-paper-2);
      background: var(--color-paper);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .status-timeline__step--done .status-timeline__dot {
      border-color: var(--color-accent);
      background: var(--color-accent);
    }
    .status-timeline__step--active .status-timeline__dot {
      border-color: var(--color-accent);
      background: var(--color-paper);
      box-shadow: 0 0 0 3px var(--color-paper), 0 0 0 5px var(--color-accent);
    }
    .status-timeline__label {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-ink-soft);
      text-align: center;
      line-height: 1.3;
      max-width: 72px;
      padding: 0 2px;
    }
    .status-timeline__step--done .status-timeline__label { color: var(--color-ink); }
    .status-timeline__step--active .status-timeline__label { color: var(--color-accent); font-weight: 700; }

    /* Respect reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
